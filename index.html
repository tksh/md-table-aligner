<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MD Table Aligner</title>
    <style>
    :root {
      --bg: #14161a;
      --panel: #1b1e24;
      --panel-2: #22262e;
      --border: #2d323c;
      --text: #e4e6eb;
      --text-dim: #8b93a1;
      --accent: #5eb3a3;
      --accent-dim: #3a6d63;
      --warn: #d99a5e;
      --mono-tag: #5e8fd9;
      --prop-tag: #b17fd6;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px 28px 14px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 16px;
      margin: 0 0 4px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0;
      font-size: 12.5px;
      color: var(--text-dim);
    }
    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    footer {
      flex-shrink: 0;
    }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      min-height: 0;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      color: var(--text-dim);
      border: none;
      border-radius: 6px;
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn:hover:not(:disabled):not(.active) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }
    .tab-btn.active {
      background: var(--accent-dim);
      color: #eafff9;
    }
    .tab-btn:disabled,
    .tab-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .tab-panel {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .tab-panel.hidden {
      display: none;
    }
    .common-controls {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
      margin-top: auto;
    }
    .field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 7px;
    }
    select,
    input[type="number"],
    button,
    textarea {
      font-family: inherit;
      font-size: 13px;
    }
    select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 9px;
    }
    select optgroup {
      color: var(--text-dim);
      font-style: normal;
    }
    select option {
      color: var(--text);
    }
    .btn {
      width: 100%;
      background: var(--accent-dim);
      color: #eafff9;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }
    .btn:hover {
      background: var(--accent);
      color: #0d1a17;
    }
    .btn.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn.secondary:hover {
      border-color: var(--text-dim);
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .row2 {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="number"] {
      width: 70px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 9px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .ratio-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .ratio-row input[type="number"] {
      width: 80px;
    }
    .ratio-sep {
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 600;
    }
    .hint {
      font-size: 11.5px;
      color: var(--text-dim);
      line-height: 1.55;
      margin: 0;
    }
    .status {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .status b {
      color: var(--text);
    }
    .copy-feedback {
      font-size: 12px;
      color: var(--accent);
      min-height: 1.2em;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: 1px;
    }
    .tag.mono {
      background: rgba(94,143,217,0.18);
      color: var(--mono-tag);
    }
    .tag.prop {
      background: rgba(177,127,214,0.18);
      color: var(--prop-tag);
    }
    .main {
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }
    .main > div {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pane-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }
    textarea {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      resize: none;
      line-height: 1.6;
      white-space: pre;
      overflow: auto;
    }
    pre#preview {
      width: 100%;
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin: 0;
      overflow: auto;
      line-height: 1.6;
      white-space: pre;
    }
    footer {
      padding: 10px 28px;
      font-size: 11.5px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }
    </style>
  </head>
  <body>
    <header>
      <h1>MD Table Aligner</h1>
      <p>日英混在の等幅テーブルをプレビューしながら列幅を揃えます</p>
    </header>

    <div class="content-wrapper">
      <div class="layout">
        <div class="sidebar">
        <div class="tabs" role="tablist">
          <button class="tab-btn active" id="tabFontBtn" role="tab"
            aria-selected="true" aria-controls="panelFont">フォント実測</button>
          <button class="tab-btn" id="tabManualBtn" role="tab"
            aria-selected="false" aria-controls="panelManual">手動比率</button>
        </div>

        <div id="panelFont" class="tab-panel" role="tabpanel">
          <div class="field">
            <label>フォント読み込み</label>
            <button class="btn" id="loadFontsBtn">ローカルフォントを読み込む</button>
          </div>

          <div class="field">
            <label>フォント選択</label>
            <select id="fontSelect" disabled>
              <option>まずローカルフォントを読み込んでください</option>
            </select>
          </div>

          <div class="status" id="status">
            フォント未読み込み。Chrome / Edge のデスクトップ版で動作します（初回はローカルフォントへのアクセス許可が必要です）。
          </div>
        </div>

        <div id="panelManual" class="tab-panel hidden" role="tabpanel">
          <div class="field">
            <label>文字幅比率</label>
            <div class="ratio-row">
              <div style="flex:1">
                <label for="cjkRatio" style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--text);margin-bottom:4px;">CJK (全角)</label>
                <input type="number" id="cjkRatio" value="2" min="1">
              </div>
              <span class="ratio-sep">:</span>
              <div style="flex:1">
                <label for="asciiRatio" style="text-transform:none;letter-spacing:0;font-size:12px;color:var(--text);margin-bottom:4px;">ASCII (半角)</label>
                <input type="number" id="asciiRatio" value="1" min="1">
              </div>
            </div>
          </div>
        </div>

        <div class="common-controls">
          <div class="field">
            <label>表示サイズ</label>
            <div class="row2">
              <input type="range" id="fontSizeSlider" min="8" max="40" value="15">
              <input type="number" id="fontSize" value="15" min="8" max="40">
              <span style="color:var(--text-dim); font-size:12px;">px</span>
            </div>
          </div>

          <div class="field">
            <button class="btn" id="alignBtn">列幅を揃える</button>
          </div>

          <div class="field">
            <button class="btn secondary" id="copyBtn">整形結果をコピー</button>
            <div class="copy-feedback" id="copyFeedback"></div>
          </div>
        </div>
      </div>

      <div class="main">
        <div>
          <div class="pane-label" style="margin-bottom:6px;">入力（生のMarkdown）</div>
          <textarea id="input" spellcheck="false">| 名前 | 説明 | 値 |
|---|---|---|
| id | 識別子 | 1 |
| name | 表示名です | "sample" |
| flag_enabled | 有効フラグ（true/false） | true |
| ratio日英幅比 | 日本語と英語の幅の比率 | 3:5 |
</textarea>
        </div>
        <div>
          <div class="pane-label" id="previewLabel"
            style="margin-bottom:6px;">プレビュー（選択フォントで表示）</div>
          <pre id="preview">フォントを選択すると、ここに選択フォントでの表示が反映されます。</pre>
        </div>
      </div>
    </div>
    </div>

    <footer id="footer">
      フォント実測モード: 等幅判定・日英幅比は読み込まれたローカルフォントを使い実際の描画幅を Canvas で測定して算出します
    </footer>

    <script>
    const loadFontsBtn = document.getElementById("loadFontsBtn");
    const fontSelect = document.getElementById("fontSelect");
    const fontSizeInput = document.getElementById("fontSize");
    const fontSizeSlider = document.getElementById("fontSizeSlider");
    const alignBtn = document.getElementById("alignBtn");
    const copyBtn = document.getElementById("copyBtn");
    const copyFeedback = document.getElementById("copyFeedback");
    const statusEl = document.getElementById("status");
    const input = document.getElementById("input");
    const preview = document.getElementById("preview");
    const previewLabel = document.getElementById("previewLabel");
    const tabFontBtn = document.getElementById("tabFontBtn");
    const tabManualBtn = document.getElementById("tabManualBtn");
    const panelFont = document.getElementById("panelFont");
    const panelManual = document.getElementById("panelManual");
    const cjkRatioInput = document.getElementById("cjkRatio");
    const asciiRatioInput = document.getElementById("asciiRatio");
    const footer = document.getElementById("footer");

    const localFontsSupported = !!window.queryLocalFonts;
    let activeTab = "font";
    let fontMeta = {};
    let alignedResult = null;
    const measureCanvas = document.createElement("canvas");
    const mctx = measureCanvas.getContext("2d");

    const WIDE_RE =
      /[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\uFF01-\uFF60\uAC00-\uD7AF]/;

    function isWideChar(ch) {
      return WIDE_RE.test(ch);
    }

    function clampFontSize(n) {
      return Math.min(40, Math.max(8, parseInt(n, 10) || 15));
    }

    function syncFontSize(value) {
      const v = clampFontSize(value);
      fontSizeInput.value = v;
      fontSizeSlider.value = v;
      updatePreview();
    }

    function setActiveTab(tab) {
      activeTab = tab;
      const isFont = tab === "font";
      tabFontBtn.classList.toggle("active", isFont);
      tabManualBtn.classList.toggle("active", !isFont);
      tabFontBtn.setAttribute("aria-selected", isFont ? "true" : "false");
      tabManualBtn.setAttribute("aria-selected", !isFont ? "true" : "false");
      panelFont.classList.toggle("hidden", !isFont);
      panelManual.classList.toggle("hidden", isFont);
      previewLabel.textContent = isFont
        ? "プレビュー（選択フォントで表示）"
        : "プレビュー（monospace で表示）";
      footer.textContent = isFont
        ? "フォント実測モード: 等幅判定・日英幅比は読み込まれたローカルフォントを使い実際の描画幅を Canvas で測定して算出します"
        : "手動比率モード: 入力された文字幅比率を元に整形されますがブラウザ標準の等幅フォントで表示されるプレビューでは見た目の揃いが完全一致しない場合があります";
      if (!localFontsSupported) {
        loadFontsBtn.disabled = isFont;
        alignBtn.disabled = isFont;
      }
      updatePreview();
    }

    function initBrowserSupport() {
      if (!localFontsSupported) {
        statusEl.textContent =
          "このブラウザは Local Font Access API に対応していません（Chrome / Edge のデスクトップ版をお使いください）。手動比率モードをご利用ください。";
        setActiveTab("manual");
      }
    }

    // --- 等幅判定（アルファベット部分の実測） ---
    function isMonospaceAlphabet(fontFamily, size) {
      mctx.font = `${size}px "${fontFamily}"`;
      const testChars = ["i", "l", "W", "M", "0", ".", "x", "A"];
      const widths = testChars.map((ch) => mctx.measureText(ch).width);
      const first = widths[0];
      const tolerance = 0.05;
      return widths.every((w) => Math.abs(w - first) < tolerance);
    }

    function measureJaEnRatio(fontFamily, size) {
      mctx.font = `${size}px "${fontFamily}"`;
      const enWidth = mctx.measureText("M").width;
      const jaWidth = mctx.measureText("あ").width;
      if (enWidth === 0) return null;
      return jaWidth / enWidth;
    }

    async function detectCJKSupport(blob) {
      try {
        const buffer = await blob.arrayBuffer();
        const view = new DataView(buffer);
        if (buffer.byteLength < 12) return false;

        const signature = String.fromCharCode(
          view.getUint8(0), view.getUint8(1), view.getUint8(2), view.getUint8(3)
        );
        let fontOffsets = [];

        if (signature === 'ttcf') {
          const numFonts = view.getUint32(8);
          for (let i = 0; i < numFonts; i++) {
            fontOffsets.push(view.getUint32(12 + i * 4));
          }
        } else if (signature === 'OTTO' || signature === '\0\1\0\0' || signature === 'true') {
          fontOffsets.push(0);
        } else {
          return false;
        }

        for (const fontOffset of fontOffsets) {
          if (checkFontCJK(view, fontOffset, buffer.byteLength)) return true;
        }
        return false;
      } catch (e) {
        return false;
      }
    }

    function findTableOffsetInFont(view, fontOffset, tag, bufferLength) {
      if (fontOffset + 12 > bufferLength) return 0;
      const numTables = view.getUint16(fontOffset + 4);
      for (let i = 0; i < numTables; i++) {
        const recordOffset = fontOffset + 12 + i * 16;
        if (recordOffset + 16 > bufferLength) break;
        const tableTag = String.fromCharCode(
          view.getUint8(recordOffset), view.getUint8(recordOffset + 1),
          view.getUint8(recordOffset + 2), view.getUint8(recordOffset + 3)
        );
        if (tableTag === tag) return view.getUint32(recordOffset + 8);
      }
      return 0;
    }

    function checkFontCJK(view, fontOffset, bufferLength) {
      const os2Offset = findTableOffsetInFont(view, fontOffset, "OS/2", bufferLength);
      if (os2Offset && os2Offset + 86 <= bufferLength) {
        const ur2 = view.getUint32(os2Offset + 46, false);
        if ((ur2 & 0x08000000) !== 0 || (ur2 & 0x10000000) !== 0) return true;

        const cp1 = view.getUint32(os2Offset + 78, false);
        const CJK_MASK = (1 << 17) | (1 << 18) | (1 << 19) | (1 << 20) | (1 << 21);
        if ((cp1 & CJK_MASK) !== 0) return true;
      }

      const cmapOffset = findTableOffsetInFont(view, fontOffset, "cmap", bufferLength);
      if (cmapOffset && cmapOffset + 4 <= bufferLength) {
        const numEncodingTables = view.getUint16(cmapOffset + 2);
        const testCodePoints = [0x4E00, 0x4E2D, 0x56FD, 0x65E5, 0x672C];
        let matchCount = 0;

        for (let i = 0; i < numEncodingTables; i++) {
          const recordOffset = cmapOffset + 4 + i * 8;
          if (recordOffset + 8 > bufferLength) break;
          const platformID = view.getUint16(recordOffset);
          const encodingID = view.getUint16(recordOffset + 2);
          const subtableOffset = cmapOffset + view.getUint32(recordOffset + 4);

          if (platformID === 1 || platformID === 2) continue;
          if (platformID === 3 && encodingID !== 1 && encodingID !== 10) continue;
          if (subtableOffset + 2 > bufferLength) continue;

          const format = view.getUint16(subtableOffset);

          if (format === 4) {
            if (subtableOffset + 14 > bufferLength) continue;
            const segCountX2 = view.getUint16(subtableOffset + 6);
            const segCount = segCountX2 / 2;
            const endCodeOffset = subtableOffset + 14;
            const startCodeOffset = endCodeOffset + segCountX2 + 2;
            const idDeltaOffset = startCodeOffset + segCountX2;
            const idRangeOffsetOffset = idDeltaOffset + segCountX2;

            if (idRangeOffsetOffset + segCountX2 > bufferLength) continue;

            for (const codePoint of testCodePoints) {
              for (let seg = 0; seg < segCount; seg++) {
                const endCode = view.getUint16(endCodeOffset + seg * 2);
                const startCode = view.getUint16(startCodeOffset + seg * 2);

                if (codePoint >= startCode && codePoint <= endCode) {
                  const idDelta = view.getInt16(idDeltaOffset + seg * 2);
                  const idRangeOffset = view.getUint16(idRangeOffsetOffset + seg * 2);

                  let glyphId;
                  if (idRangeOffset === 0) {
                    glyphId = (codePoint + idDelta) & 0xFFFF;
                  } else {
                    const glyphOffset = idRangeOffsetOffset + seg * 2 + idRangeOffset + (codePoint - startCode) * 2;
                    if (glyphOffset + 2 <= bufferLength) {
                      glyphId = view.getUint16(glyphOffset);
                      if (glyphId !== 0) {
                        glyphId = (glyphId + idDelta) & 0xFFFF;
                      }
                    } else {
                      glyphId = 0;
                    }
                  }

                  if (glyphId !== 0) {
                    matchCount++;
                    break;
                  }
                }
              }
            }
          } else if (format === 12) {
            if (subtableOffset + 16 > bufferLength) continue;
            const numGroups = view.getUint32(subtableOffset + 12);

            for (const codePoint of testCodePoints) {
              for (let g = 0; g < numGroups; g++) {
                const groupOffset = subtableOffset + 16 + g * 12;
                if (groupOffset + 12 > bufferLength) break;
                const startCharCode = view.getUint32(groupOffset);
                const endCharCode = view.getUint32(groupOffset + 4);
                const startGlyphID = view.getUint32(groupOffset + 8);

                if (codePoint >= startCharCode && codePoint <= endCharCode) {
                  const glyphId = startGlyphID + (codePoint - startCharCode);
                  if (glyphId !== 0) {
                    matchCount++;
                  }
                  break;
                }
              }
            }
          }
        }
        if (matchCount >= 3) return true;
      }

      return false;
    }

    function approximateFraction(x, maxDenom = 20) {
      let bestNum = 1, bestDen = 1, bestErr = Infinity;
      for (let den = 1; den <= maxDenom; den++) {
        const num = Math.round(x * den);
        if (num <= 0) continue;
        const err = Math.abs(num / den - x);
        if (err < bestErr) {
          bestErr = err;
          bestNum = num;
          bestDen = den;
        }
      }
      return `${bestNum}:${bestDen}`;
    }

    async function loadFonts() {
      if (!window.queryLocalFonts) {
        statusEl.textContent =
          "このブラウザは Local Font Access API に対応していません（Chrome / Edge のデスクトップ版をお使いください）。";
        return;
      }
      statusEl.textContent =
        "読み込み中…（権限プロンプトが出た場合は許可してください）";
      try {
        const fonts = await window.queryLocalFonts();
        const size = clampFontSize(fontSizeInput.value);

        const families = [...new Set(fonts.map((f) => f.family))];
        let failCount = 0;

        // Store blobs for cmap parsing, keyed by family
        const fontBlobs = {};
        for (const fontData of fonts) {
          try {
            const blob = await fontData.blob();
            fontBlobs[fontData.family] = blob;
            const face = new FontFace(fontData.postscriptName, blob);
            await face.load();
            document.fonts.add(face);
          } catch (e) {
            failCount++;
          }
        }
        await document.fonts.ready;

        for (const family of families) {
          const mono = isMonospaceAlphabet(family, size);
          const hasJa = fontBlobs[family]
            ? await detectCJKSupport(fontBlobs[family])
            : false;
          let ratio = null, ratioLabel = null;
          if (mono && hasJa) {
            ratio = measureJaEnRatio(family, size);
            if (ratio && ratio > 1.05) {
              ratioLabel = approximateFraction(ratio, 20);
            }
          }
          fontMeta[family] = { monospace: mono, hasJa, ratio, ratioLabel };
        }

        populateFontSelect(families);
        fontSelect.disabled = false;
        statusEl.innerHTML =
          `<b>${families.length}</b> 種類のフォントを読み込みました。等幅: <b>${
            families.filter((f) => fontMeta[f].monospace).length
          }</b> 件${failCount ? `（${failCount}件は読み込み失敗）` : ""}`;
        updatePreview();
      } catch (e) {
        statusEl.textContent = `取得に失敗しました: ${e.name} - ${e.message}`;
      }
    }

    function populateFontSelect(families) {
      const monoJaFonts = families.filter((f) => fontMeta[f].monospace && fontMeta[f].hasJa)
        .sort((a, b) => a.localeCompare(b, "ja"));
      const monoAsciiFonts = families.filter((f) => fontMeta[f].monospace && !fontMeta[f].hasJa)
        .sort((a, b) => a.localeCompare(b, "ja"));
      const propFonts = families.filter((f) => !fontMeta[f].monospace)
        .sort((a, b) => a.localeCompare(b, "ja"));

      fontSelect.innerHTML = "";

      const monoJaGroup = document.createElement("optgroup");
      monoJaGroup.label = `等幅（CJK対応） (${monoJaFonts.length})`;
      for (const f of monoJaFonts) {
        const opt = document.createElement("option");
        opt.value = f;
        const label = fontMeta[f].ratioLabel
          ? `${f}  [日英 ${fontMeta[f].ratioLabel}]`
          : f;
        opt.textContent = label;
        monoJaGroup.appendChild(opt);
      }
      fontSelect.appendChild(monoJaGroup);

      const monoAsciiGroup = document.createElement("optgroup");
      monoAsciiGroup.label = `等幅（ASCII のみ） (${monoAsciiFonts.length})`;
      for (const f of monoAsciiFonts) {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        monoAsciiGroup.appendChild(opt);
      }
      fontSelect.appendChild(monoAsciiGroup);

      const propGroup = document.createElement("optgroup");
      propGroup.label = `プロポーショナル (${propFonts.length})`;
      for (const f of propFonts) {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        propGroup.appendChild(opt);
      }
      fontSelect.appendChild(propGroup);

      if (monoJaFonts.length) fontSelect.value = monoJaFonts[0];
      else if (monoAsciiFonts.length) fontSelect.value = monoAsciiFonts[0];
    }

    function currentFont() {
      const size = clampFontSize(fontSizeInput.value);
      const family = fontSelect.value;
      return { family, size };
    }

    function getManualRatios() {
      const cjk = parseInt(cjkRatioInput.value, 10);
      const ascii = parseInt(asciiRatioInput.value, 10);
      if (!Number.isFinite(cjk) || cjk < 1 || !Number.isFinite(ascii) || ascii < 1) {
        return null;
      }
      return { cjk, ascii };
    }

    function updatePreview() {
      const size = clampFontSize(fontSizeInput.value);
      preview.style.fontSize = size + "px";
      preview.textContent = alignedResult !== null ? alignedResult : input.value;

      if (activeTab === "font") {
        const { family } = currentFont();
        if (!family || fontSelect.disabled) {
          preview.style.fontFamily = "monospace";
          return;
        }
        preview.style.fontFamily = `"${family}"`;
      } else {
        preview.style.fontFamily = "monospace";
      }
    }

    function parseTableBlock(text) {
      const lines = text.split("\n");
      const rows = [];
      const lineIndices = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.includes("|") && line.trim() !== "") {
          const cells = line.split("|");
          if (cells[0].trim() === "") cells.shift();
          if (cells.length && cells[cells.length - 1].trim() === "") cells.pop();
          rows.push(cells.map((c) => c.trim()));
          lineIndices.push(i);
        }
      }
      return { lines, rows, lineIndices };
    }

    function isSeparatorRow(cells) {
      return cells.every((c) => /^:?-+:?$/.test(c.trim()));
    }

    function parseAlignments(rows, sepRowIdx, colCount) {
      const aligns = new Array(colCount).fill("none");
      if (sepRowIdx >= 0) {
        rows[sepRowIdx].forEach((c, idx) => {
          const t = c.trim();
          if (/^:-+:$/.test(t)) aligns[idx] = "center";
          else if (/^:-+$/.test(t)) aligns[idx] = "left";
          else if (/^-+:$/.test(t)) aligns[idx] = "right";
        });
      }
      return aligns;
    }

    function measureStringUnits(str, cjkUnits, asciiUnits) {
      let total = 0;
      for (const ch of str) {
        total += isWideChar(ch) ? cjkUnits : asciiUnits;
      }
      return total;
    }

    function alignMarkdownTable(text, family, size) {
      mctx.font = `${size}px "${family}"`;
      const { lines, rows, lineIndices } = parseTableBlock(text);
      if (rows.length === 0) return text;

      const sepRowIdx = rows.findIndex(isSeparatorRow);
      const colCount = Math.max(...rows.map((r) => r.length));
      const aligns = parseAlignments(rows, sepRowIdx, colCount);

      const spaceWidth = mctx.measureText(" ").width;
      const colWidths = new Array(colCount).fill(0);
      rows.forEach((r, ri) => {
        if (ri === sepRowIdx) return;
        r.forEach((c, ci) => {
          const w = mctx.measureText(c).width;
          if (w > colWidths[ci]) colWidths[ci] = w;
        });
      });
      const minDashWidth = mctx.measureText("---").width;
      for (let i = 0; i < colCount; i++) {
        if (colWidths[i] < minDashWidth) colWidths[i] = minDashWidth;
      }

      function padCell(content, targetWidth, align) {
        const contentWidth = mctx.measureText(content).width;
        const extra = Math.max(0, targetWidth - contentWidth);
        const extraSpaces = Math.round(extra / spaceWidth);
        if (align === "right") {
          return " ".repeat(extraSpaces + 1) + content + " ";
        } else if (align === "center") {
          const left = Math.floor(extraSpaces / 2);
          const right = extraSpaces - left;
          return " ".repeat(left + 1) + content + " ".repeat(right + 1);
        } else {
          return " " + content + " ".repeat(extraSpaces + 1);
        }
      }

      function buildSeparatorCell(width, align) {
        const dashWidth = mctx.measureText("-").width;
        let dashCount = Math.max(3, Math.round(width / dashWidth));
        if (align === "center") dashCount = Math.max(1, dashCount - 2);
        else if (align !== "none") dashCount = Math.max(1, dashCount - 1);
        const dashes = "-".repeat(dashCount);
        if (align === "center") return ` :${dashes}: `;
        if (align === "left") return ` :${dashes} `;
        if (align === "right") return ` ${dashes}: `;
        return " " + dashes + " ";
      }

      return applyAlignedRows(
        lines, rows, lineIndices, sepRowIdx, colCount, aligns,
        (raw, ci, ri) => {
          if (ri === sepRowIdx) {
            return buildSeparatorCell(colWidths[ci], aligns[ci]);
          }
          return padCell(raw, colWidths[ci], aligns[ci]);
        },
      );
    }

    function alignMarkdownTableManual(text, cjkUnits, asciiUnits) {
      const { lines, rows, lineIndices } = parseTableBlock(text);
      if (rows.length === 0) return text;

      const sepRowIdx = rows.findIndex(isSeparatorRow);
      const colCount = Math.max(...rows.map((r) => r.length));
      const aligns = parseAlignments(rows, sepRowIdx, colCount);

      const colWidths = new Array(colCount).fill(0);
      rows.forEach((r, ri) => {
        if (ri === sepRowIdx) return;
        r.forEach((c, ci) => {
          const w = measureStringUnits(c, cjkUnits, asciiUnits);
          if (w > colWidths[ci]) colWidths[ci] = w;
        });
      });
      for (let i = 0; i < colCount; i++) {
        if (colWidths[i] < 3) colWidths[i] = 3;
      }

      function padCell(content, targetUnits, align) {
        const contentUnits = measureStringUnits(content, cjkUnits, asciiUnits);
        const extraSpaces = Math.max(0, targetUnits - contentUnits);
        if (align === "right") {
          return " ".repeat(extraSpaces + 1) + content + " ";
        } else if (align === "center") {
          const left = Math.floor(extraSpaces / 2);
          const right = extraSpaces - left;
          return " ".repeat(left + 1) + content + " ".repeat(right + 1);
        } else {
          return " " + content + " ".repeat(extraSpaces + 1);
        }
      }

      function buildSeparatorCell(widthUnits, align) {
        let dashCount = Math.max(3, widthUnits);
        if (align === "center") dashCount = Math.max(1, dashCount - 2);
        else if (align !== "none") dashCount = Math.max(1, dashCount - 1);
        const dashes = "-".repeat(dashCount);
        if (align === "center") return ` :${dashes}: `;
        if (align === "left") return ` :${dashes} `;
        if (align === "right") return ` ${dashes}: `;
        return " " + dashes + " ";
      }

      return applyAlignedRows(
        lines, rows, lineIndices, sepRowIdx, colCount, aligns,
        (raw, ci, ri) => {
          if (ri === sepRowIdx) {
            return buildSeparatorCell(colWidths[ci], aligns[ci]);
          }
          return padCell(raw, colWidths[ci], aligns[ci]);
        },
      );
    }

    function applyAlignedRows(
      lines, rows, lineIndices, sepRowIdx, colCount, aligns, buildCell,
    ) {
      const outRows = rows.map((r, ri) => {
        const cells = [];
        for (let ci = 0; ci < colCount; ci++) {
          const raw = r[ci] !== undefined ? r[ci] : "";
          cells.push(buildCell(raw, ci, ri));
        }
        return "|" + cells.join("|") + "|";
      });

      const newLines = [...lines];
      lineIndices.forEach((lineIdx, i) => {
        newLines[lineIdx] = outRows[i];
      });
      return newLines.join("\n");
    }

    function showCopyFeedback(message) {
      copyFeedback.textContent = message;
      clearTimeout(showCopyFeedback._timer);
      showCopyFeedback._timer = setTimeout(() => {
        copyFeedback.textContent = "";
      }, 2500);
    }

    // --- イベント ---
    tabFontBtn.addEventListener("click", () => setActiveTab("font"));
    tabManualBtn.addEventListener("click", () => setActiveTab("manual"));

    loadFontsBtn.addEventListener("click", loadFonts);
    fontSelect.addEventListener("change", updatePreview);
    fontSizeInput.addEventListener("input", () => syncFontSize(fontSizeInput.value));
    fontSizeSlider.addEventListener("input", () => syncFontSize(fontSizeSlider.value));
    input.addEventListener("input", () => {
      alignedResult = null;
      updatePreview();
    });
    cjkRatioInput.addEventListener("input", updatePreview);
    asciiRatioInput.addEventListener("input", updatePreview);

    alignBtn.addEventListener("click", () => {
      copyFeedback.textContent = "";
      if (activeTab === "font") {
        const { family, size } = currentFont();
        if (!family || fontSelect.disabled) {
          statusEl.textContent = "フォントを選択してください。";
          return;
        }
        alignedResult = alignMarkdownTable(input.value, family, size);
      } else {
        const ratios = getManualRatios();
        if (!ratios) {
          showCopyFeedback("CJK と ASCII に 1 以上の整数を入力してください。");
          return;
        }
        alignedResult = alignMarkdownTableManual(
          input.value, ratios.cjk, ratios.ascii,
        );
      }
      updatePreview();
    });

    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(alignedResult !== null ? alignedResult : input.value);
        showCopyFeedback("クリップボードにコピーしました。");
      } catch (e) {
        showCopyFeedback("コピーに失敗しました。手動で選択してください。");
      }
    });

    initBrowserSupport();
    updatePreview();
    </script>
  </body>
</html>
